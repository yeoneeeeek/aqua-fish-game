<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aqua Fish Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrap">
    <section class="phone-frame">
      <header class="game-header">
        <div>
          <p class="eyebrow">My Tiny Aquarium</p>
          <h1>아쿠아 피쉬</h1>
        </div>

        <div class="status-panel" aria-label="게임 상태">
          <div class="coin-box">
            <span class="coin-icon">🪙</span>
            <strong id="coinCount">0</strong>
          </div>
          <div class="heart-box" aria-label="하트">
            <span class="heart-icon">💖</span>
            <strong id="heartCount">5</strong>
            <small id="heartTimer">MAX</small>
          </div>
        </div>
      </header>

      <section class="aquarium" id="aquarium" aria-label="수조">
        <div class="water-light light-1"></div>
        <div class="water-light light-2"></div>
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="sand"></div>
        <div class="seaweed seaweed-1"></div>
        <div class="seaweed seaweed-2"></div>
        <div class="seaweed seaweed-3"></div>
        <div class="coral coral-1"></div>
        <div class="coral coral-2"></div>
      </section>

      <section class="shop-panel">
        <div class="info-card">
          <span>물고기</span>
          <strong id="fishCount">1마리</strong>
        </div>
        <div class="info-card">
          <span>구매비용</span>
          <strong>100코인</strong>
        </div>
      </section>

      <section class="control-panel">
        <button type="button" id="feedBtn" class="action-btn primary">
          <span>🍤</span>
          먹이주기
        </button>
        <button type="button" id="cleanBtn" class="action-btn secondary">
          <span>🧽</span>
          수조청소
          <small id="cleanTimer">READY</small>
        </button>
        <button type="button" id="buyFishBtn" class="action-btn shop">
          <span>🐠</span>
          물고기 구매
        </button>
      </section>

      <button type="button" id="resetBtn" class="reset-btn">저장 데이터 초기화</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
