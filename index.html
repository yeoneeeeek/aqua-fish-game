<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Aqua Fish Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-wrap">
    <section class="phone-frame">
      <header class="game-header">
        <div>
          <p class="eyebrow">My Tiny Aquarium</p>
          <h1>아쿠아 피쉬</h1>
        </div>

        <div class="status-panel" aria-label="게임 상태">
          <div class="coin-box">
            <span class="coin-icon">🪙</span>
            <strong id="coinCount">0</strong>
          </div>
          <div class="heart-box" aria-label="하트">
            <span class="heart-icon">💖</span>
            <strong id="heartCount">5</strong>
            <small id="heartTimer">MAX</small>
          </div>
        </div>
      </header>

      <section class="aquarium" id="aquarium" aria-label="수조">
        <div class="water-light light-1"></div>
        <div class="water-light light-2"></div>
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="sand"></div>
        <div class="seaweed seaweed-1"></div>
        <div class="seaweed seaweed-2"></div>
        <div class="seaweed seaweed-3"></div>
        <div class="coral coral-1"></div>
        <div class="coral coral-2"></div>
      </section>

      <section class="shop-panel">
        <div class="info-card">
          <span>물고기</span>
          <strong id="fishCount">1마리</strong>
        </div>
        <div class="info-card">
          <span>구매비용</span>
          <strong>100코인</strong>
        </div>
      </section>

      <section class="control-panel">
        <button type="button" id="feedBtn" class="action-btn primary">
          <span>🍤</span>
          먹이주기
        </button>
        <button type="button" id="cleanBtn" class="action-btn secondary">
          <span>🧽</span>
          수조청소
          <small id="cleanTimer">READY</small>
        </button>
        <button type="button" id="decorateBtn" class="action-btn decorate">
          <span>🪸</span>
          수조 꾸미기
        </button>
        <button type="button" id="buyFishBtn" class="action-btn shop">
          <span>🐠</span>
          물고기 구매
        </button>
      </section>

      <button type="button" id="resetBtn" class="reset-btn">저장 데이터 초기화</button>

      <div class="decorate-modal" id="decorateModal" aria-hidden="true">
        <div class="decorate-modal__box" role="dialog" aria-modal="true" aria-labelledby="decorateModalTitle">
          <div class="decorate-modal__head">
            <strong id="decorateModalTitle">수조 꾸미기</strong>
            <button type="button" id="decorateCloseBtn" aria-label="닫기">×</button>
          </div>
          <div class="decorate-menu">
            <button type="button" id="expandTankBtn">
              <span>수조 확장하기</span>
              <small>5000코인</small>
            </button>
            <button type="button" id="buySeaweedBtn">
              <span>해조류</span>
              <small>100코인</small>
            </button>
            <button type="button" id="buyRockBtn">
              <span>바위</span>
              <small>200코인</small>
            </button>
          </div>
        </div>
      </div>

      <div class="sell-modal" id="sellModal" aria-hidden="true">
        <div class="sell-modal__box" role="dialog" aria-modal="true" aria-labelledby="sellModalText">
          <p id="sellModalText">물고기를 판매할까요?</p>
          <div class="sell-modal__actions">
            <button type="button" id="sellYesBtn">네</button>
            <button type="button" id="sellNoBtn">아니요</button>
          </div>
        </div>
      </div>
      <div class="deco-edit-modal" id="decoEditModal" aria-hidden="true">
        <div class="deco-edit-modal__box" role="dialog" aria-modal="true" aria-labelledby="decoEditModalText">
          <p id="decoEditModalText">꾸미기 아이템을 어떻게 할까요?</p>
          <div class="deco-edit-modal__actions">
            <button type="button" id="decoMoveBtn">이동하기</button>
            <button type="button" id="decoDeleteBtn">삭제하기</button>
            <button type="button" id="decoCancelBtn">취소</button>
          </div>
        </div>
      </div>

      <div class="update-notice-modal" id="updateNoticeModal" aria-hidden="true">
        <div class="update-notice-modal__box" role="dialog" aria-modal="true" aria-labelledby="updateNoticeTitle">
          <strong id="updateNoticeTitle">업데이트 안내</strong>
          <ul>
            <li>물고기 판매 가격이 일반 200코인, 황금 500코인으로 조정됐어요.</li>
            <li>물고기 성장 속도가 기존보다 약 30% 느려졌어요.</li>
            <li>성장완료 물고기는 더블클릭으로 판매할 수 있어요.</li>
            <li>물고기 이동 속도가 3가지 타입으로 랜덤 적용돼요.</li>
            <li>새로고침해도 저장 데이터가 유지되도록 안정성을 보완했어요.</li>
          </ul>
          <button type="button" id="updateNoticeCloseBtn">확인</button>
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
